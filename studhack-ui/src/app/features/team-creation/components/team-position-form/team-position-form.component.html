<article [formGroup]="form()" tuiCardLarge="compact" tuiSurface="floating" class="team-position-form">
  <header tuiHeader="h6">
    <span tuiTitle>Позиция {{ index() + 1 }}</span>
  </header>

  <div class="team-position-form__fields">
    <label tuiLabel>
      Название роли
      <tui-textfield>
        <input
          tuiTextfield
          formControlName="title"
          placeholder="Frontend Engineer"
        />
      </tui-textfield>
    </label>

    <label tuiLabel>
      Специализация
      <tui-textfield
        tuiChevron
        [stringify]="stringifySpecialization"
        [identityMatcher]="matchSpecialization"
      >
        <input
          tuiComboBox
          formControlName="specializationId"
          placeholder="Выберите специализацию"
        />

        <tui-data-list-wrapper
          *tuiTextfieldDropdown
          new
          [items]="specializations() | tuiFilterByInput"
        />
      </tui-textfield>
    </label>

    <label tuiLabel>
      Ключевой навык
      <tui-textfield
        tuiChevron
        [stringify]="stringifySkill"
        [identityMatcher]="matchSkill"
      >
        <input
          tuiComboBox
          formControlName="requiredSkillId"
          placeholder="Выберите навык"
        />

        <tui-data-list-wrapper
          *tuiTextfieldDropdown
          new
          [items]="skills() | tuiFilterByInput"
        />
      </tui-textfield>
    </label>
  </div>

  <label tuiLabel>
    Комментарий
    <textarea
      formControlName="description"
      class="team-position-form__textarea"
      rows="3"
      placeholder="Что именно должен закрыть участник в команде"
    ></textarea>
  </label>

  <div class="team-position-form__footer">
    <label tuiLabel>
      <input
        tuiCheckbox
        type="checkbox"
        formControlName="filledByExternal"
      />
      Роль уже закрыта внешним участником
    </label>

    @if (canRemove()) {
      <button
        tuiButton
        type="button"
        appearance="secondary"
        size="m"
        (click)="remove.emit()"
      >
        Удалить
      </button>
    }
  </div>
</article>
