<article tuiCardLarge tuiSurface="floating" class="event-card">
  <div class="event-card__cover" [style.background]="coverBackground()">
    <div class="event-card__cover-copy">
      <span class="event-card__cover-label">{{ coverLabel() }}</span>
      <strong class="event-card__cover-date">{{ coverDate() }}</strong>
    </div>
  </div>

  <div class="event-card__content">
    <div class="event-card__chips">
      @for (badge of badges(); track badge.label) {
        <tui-badge [appearance]="badge.appearance" [iconStart]="badge.icon">{{ badge.label }}</tui-badge>
      }
    </div>

    <div class="event-card__main">
      <h3 class="event-card__name">{{ event().name }}</h3>

      <p class="event-card__description">
        {{ event().description || 'Описание мероприятия появится после публикации полной карточки.' }}
      </p>

      @if (detailsHref(); as detailsHref) {
        <a
          class="event-card__link"
          iconEnd="@tui.arrow-up-right"
          tuiLink
          [href]="detailsHref"
          target="_blank"
          rel="noreferrer"
        >
          Подробнее
        </a>
      }
    </div>

    <div class="event-card__footer">
      <div class="event-card__actions">
        <a
          tuiButton
          routerLink="/teams/create"
          appearance="accent"
          size="m"
          iconStart="@tui.plus"
        >
          Собрать команду
        </a>

        <button tuiButton type="button" appearance="outline" size="m">
          Присоединиться к команде
        </button>
      </div>

      <div class="event-card__support">
        <button
          tuiButton
          type="button"
          appearance="outline"
          size="m"
          (click)="toggleSubscription()"
        >
          {{ isSubscribed() ? 'Вы подписаны' : 'Подписаться' }}
        </button>

        <div class="event-card__difficulty">
          <label tuiProgressLabel>
            <span class="event-card__difficulty-value">
              {{ difficulty().label }}
            </span>
            <tui-progress-circle
              size="m"
              [max]="difficulty().max"
              [value]="difficulty().value"
              [color]="difficulty().color"
            ></tui-progress-circle>
          </label>
        </div>
      </div>
    </div>
  </div>
</article>
